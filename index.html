<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indie Quiz Challenge</title>
    <style>
        :root {
            --primary-bg: #521296;
            --error-bg: #e74c3c;
            --accent-yellow: #FFD700;
            --accent-hover: #FFF000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease;
            overflow: hidden;
        }

        #main-wrapper {
            text-align: center;
            transition: filter 0.6s ease;
            width: 95%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 80vh;
        }

        h1 {
            color: white;
            font-size: 3.2rem;
            margin-bottom: 60px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            animation: floating 3.5s ease-in-out infinite;
            line-height: 1.2;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Container pulsanti: riga fissa */
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: nowrap; /* Impedisce l'andata a capo */
            width: 100%;
        }

        .btn {
            background-color: var(--accent-yellow);
            color: #2c3e50;
            border: none;
            padding: 25px 40px;
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 0 #b79b00;
            transition: transform 0.2s, background-color 0.2s;
            white-space: nowrap; /* Impedisce al testo del pulsante di spezzarsi */
            flex-shrink: 0; /* Impedisce al pulsante di rimpicciolirsi */
        }

        .btn:hover {
            transform: translateY(-5px);
            background-color: var(--accent-hover);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b79b00;
        }

        #victory-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hint-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 30px 60px;
            border-radius: 20px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
            font-size: 3rem;
        }

        .hidden { display: none !important; }
        .blur { filter: blur(20px); }
        .wrong-flash { background-color: var(--error-bg) !important; }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="main-wrapper">
        <div id="start-screen">
            <h1>Sei un esperto di<br>Giochi Indie?</h1>
            <button class="btn" onclick="startGame()">INIZIA IL QUIZ</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <h1 id="question-text">Indovina il gioco indie:</h1>
            <div class="btn-container" id="options-container"></div>
        </div>
    </div>

    <div id="victory-overlay">
        <h2 style="font-size: 5rem; margin: 0;">HAI VINTO!</h2>
        <div class="hint-box">Indizio: 👧🧥🌧️👁️</div>
    </div>

    <script>
        const questions = [
            { options: ["Hades", "Gears 5", "Fortnite"], correct: 0 },
            { options: ["Cuphead", "Rayman Legends", "LittleBigPlanet 3"], correct: 0 },
            { options: ["Magic Arena", "Slay the Spire", "Gwent"], correct: 1 },
            { options: ["Katana ZERO", "Devil May Cry 5", "Ninja Gaiden"], correct: 0 },
            { options: ["Bloodborne", "Dark Souls III", "Hyper Light Drifter"], correct: 2 }
        ];

        let currentIdx = 0;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            questions[currentIdx].options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = opt;
                b.onclick = () => handleChoice(i);
                container.appendChild(b);
            });
        }

        function handleChoice(index) {
            if (index === questions[currentIdx].correct) {
                currentIdx++;
                if (currentIdx >= questions.length) {
                    document.getElementById('main-wrapper').classList.add('blur');
                    document.getElementById('victory-overlay').style.display = 'flex';
                } else {
                    loadQuestion();
                }
            } else {
                document.body.classList.add('wrong-flash');
                setTimeout(() => document.body.classList.remove('wrong-flash'), 300);
                currentIdx = 0;
                loadQuestion();
            }
        }
    </script>
</body>
</html>
